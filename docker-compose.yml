version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: nurby
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nurby_dev}
      POSTGRES_DB: nurby
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Runs once on a fresh volume to enable the pgvector extension so
      # vector columns work before the first migration. See PR #2.
      - ./config/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nurby"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    ports:
      - "8554:8554"       # RTSP
      - "8889:8889"       # WebRTC HTTP (WHIP/WHEP)
      - "8189:8189/udp"   # WebRTC ICE media
      - "8888:8888"       # HLS
      - "9997:9997"       # API
    environment:
      # Advertise 127.0.0.1 as an extra ICE host candidate so the host
      # browser can reach WebRTC media without needing the docker bridge
      # IP to be routable.
      MTX_WEBRTCADDITIONALHOSTS: "127.0.0.1"
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml

  api:
    image: ghcr.io/${NURBY_REGISTRY_OWNER:-eshpelin}/nurby-api:${NURBY_VERSION:-latest}
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4748:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://nurby:${POSTGRES_PASSWORD:-nurby_dev}@postgres:5432/nurby
      REDIS_URL: redis://redis:6379/0
      MEDIAMTX_API_URL: http://mediamtx:9997
      RECORDINGS_PATH: /data/recordings
      THUMBNAILS_PATH: /data/thumbnails
      # Stable signing secret so issued tokens survive restarts. Sourced
      # from .env; without it each restart mints a fresh random secret and
      # invalidates every existing session/login.
      JWT_SECRET: ${JWT_SECRET:-}
      # Where to reach Ollama for one-click local AI. Defaults to the
      # bundled `ollama` service below (start it with the local-ai profile).
      # Falls back to the Docker host if that service is not running.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    volumes:
      - recordings:/data/recordings
      - thumbnails:/data/thumbnails
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Bundled local AI. An optional Ollama server so Docker users get
  # one-click, fully local VLM without installing anything on the host.
  # Behind the "local-ai" profile because the image plus a pulled model is
  # multi-GB and wants real RAM (and a GPU helps). Start it with:
  #   docker compose --profile local-ai up -d ollama
  # The onboarding wizard and Settings then detect it at http://ollama:11434
  # and pull a RAM-appropriate model over the HTTP API. To use GPUs,
  # uncomment the `deploy.resources.reservations.devices` block.
  ollama:
    profiles: ["local-ai"]
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Nurby MCP server. exposes the read-only agent tools over the Model
  # Context Protocol so any MCP client (Claude Desktop, etc) can query a
  # household's cameras. Behind the "mcp" profile so a plain
  # `docker compose up` does NOT start it. Run explicitly with:
  #   NURBY_MCP_TOKEN=<jwt> docker compose --profile mcp up mcp
  # The operator sets NURBY_MCP_TOKEN to a Nurby JWT copied from a
  # logged-in session. that token scopes every tool call to one user and
  # the camera ACL still applies. See docs/mcp.md.
  mcp:
    profiles: ["mcp"]
    image: ghcr.io/${NURBY_REGISTRY_OWNER:-eshpelin}/nurby-mcp:${NURBY_VERSION:-latest}
    build:
      context: .
      dockerfile: services/mcp/Dockerfile
    restart: unless-stopped
    # stdio is the default transport (Claude Desktop launches it). The
    # port is only used when NURBY_MCP_HTTP=1 selects the HTTP transport.
    ports:
      - "4749:4749"
    environment:
      DATABASE_URL: postgresql+asyncpg://nurby:${POSTGRES_PASSWORD:-nurby_dev}@postgres:5432/nurby
      REDIS_URL: redis://redis:6379/0
      MEDIAMTX_API_URL: http://mediamtx:9997
      THUMBNAILS_PATH: /data/thumbnails
      NURBY_MCP_TOKEN: ${NURBY_MCP_TOKEN:-}
      # Set NURBY_MCP_HTTP=1 to serve over HTTP on port 4749 instead of
      # stdio (SDK permitting). stdio is the must-have default.
      NURBY_MCP_HTTP: ${NURBY_MCP_HTTP:-}
    volumes:
      - thumbnails:/data/thumbnails:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingestion:
    image: ghcr.io/${NURBY_REGISTRY_OWNER:-eshpelin}/nurby-ingestion:${NURBY_VERSION:-latest}
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://nurby:${POSTGRES_PASSWORD:-nurby_dev}@postgres:5432/nurby
      REDIS_URL: redis://redis:6379/0
      MEDIAMTX_API_URL: http://mediamtx:9997
      MEDIAMTX_RTSP_URL: rtsp://mediamtx:8554
      RECORDINGS_PATH: /data/recordings
      THUMBNAILS_PATH: /data/thumbnails
      # USB and built-in cameras must be bridged on the host. Docker Desktop
      # cannot pass AVFoundation or v4l2 devices into a Linux container. Run
      # `python -m services.ingestion.host_bridge_main` on the host instead.
      DISABLE_WEBCAM_BRIDGE: "1"
      # Some hosted demo clips (e.g. stock-video CDNs) reject requests with
      # no User-Agent. OpenCV's FFmpeg backend forwards these capture options
      # to ffmpeg, so a browser-like UA lets those URLs stream. Harmless for
      # real RTSP/ONVIF cameras.
      OPENCV_FFMPEG_CAPTURE_OPTIONS: "user_agent;Mozilla/5.0"
    volumes:
      - recordings:/data/recordings
      - thumbnails:/data/thumbnails
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  perception:
    image: ghcr.io/${NURBY_REGISTRY_OWNER:-eshpelin}/nurby-perception:${NURBY_VERSION:-latest}
    build:
      context: .
      dockerfile: services/perception/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://nurby:${POSTGRES_PASSWORD:-nurby_dev}@postgres:5432/nurby
      REDIS_URL: redis://redis:6379/0
      MEDIAMTX_RTSP_URL: rtsp://mediamtx:8554
      RECORDINGS_PATH: /data/recordings
      THUMBNAILS_PATH: /data/thumbnails
      AUDIO_STORAGE_PATH: /data/audio
      # Reach the bundled Ollama service the same way the API does, so VLM
      # captions resolve the provider base_url on the compose network.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      # Browser-like UA so hosted demo clips on stock-video CDNs stream.
      OPENCV_FFMPEG_CAPTURE_OPTIONS: "user_agent;Mozilla/5.0"
    volumes:
      - recordings:/data/recordings
      - thumbnails:/data/thumbnails
      - audio:/data/audio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/${NURBY_REGISTRY_OWNER:-eshpelin}/nurby-frontend:${NURBY_VERSION:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_INTERNAL_API_URL: http://api:8000
        NEXT_PUBLIC_API_URL: http://localhost:4748
        NEXT_PUBLIC_WS_URL: ws://localhost:4748
        NEXT_PUBLIC_WEBRTC_URL: http://localhost:8889
    restart: unless-stopped
    ports:
      - "4747:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4748
      NEXT_PUBLIC_WS_URL: ws://localhost:4748
      NEXT_PUBLIC_WEBRTC_URL: http://localhost:8889
      # Server-side rewrites run inside this container; need the
      # docker-network hostname, not the host-mapped port.
      NEXT_INTERNAL_API_URL: http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  recordings:
  thumbnails:
  audio:
  ollama_models:
