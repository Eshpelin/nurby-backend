version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: nurby
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nurby_dev}
      POSTGRES_DB: nurby
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nurby"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    ports:
      - "8554:8554"       # RTSP
      - "8889:8889"       # WebRTC HTTP (WHIP/WHEP)
      - "8189:8189/udp"   # WebRTC ICE media
      - "8888:8888"       # HLS
      - "9997:9997"       # API
    environment:
      # Advertise 127.0.0.1 as an extra ICE host candidate so the host
      # browser can reach WebRTC media without needing the docker bridge
      # IP to be routable.
      MTX_WEBRTCADDITIONALHOSTS: "127.0.0.1"
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://nurby:${POSTGRES_PASSWORD:-nurby_dev}@postgres:5432/nurby
      REDIS_URL: redis://redis:6379/0
      MEDIAMTX_API_URL: http://mediamtx:9997
      RECORDINGS_PATH: /data/recordings
      THUMBNAILS_PATH: /data/thumbnails
    volumes:
      - recordings:/data/recordings
      - thumbnails:/data/thumbnails
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://nurby:${POSTGRES_PASSWORD:-nurby_dev}@postgres:5432/nurby
      REDIS_URL: redis://redis:6379/0
      MEDIAMTX_API_URL: http://mediamtx:9997
      MEDIAMTX_RTSP_URL: rtsp://mediamtx:8554
      RECORDINGS_PATH: /data/recordings
      THUMBNAILS_PATH: /data/thumbnails
      # USB and built-in cameras must be bridged on the host. Docker Desktop
      # cannot pass AVFoundation or v4l2 devices into a Linux container. Run
      # `python -m services.ingestion.host_bridge_main` on the host instead.
      DISABLE_WEBCAM_BRIDGE: "1"
    volumes:
      - recordings:/data/recordings
      - thumbnails:/data/thumbnails
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  perception:
    build:
      context: .
      dockerfile: services/perception/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://nurby:${POSTGRES_PASSWORD:-nurby_dev}@postgres:5432/nurby
      REDIS_URL: redis://redis:6379/0
      MEDIAMTX_RTSP_URL: rtsp://mediamtx:8554
      RECORDINGS_PATH: /data/recordings
      THUMBNAILS_PATH: /data/thumbnails
      AUDIO_STORAGE_PATH: /data/audio
    volumes:
      - recordings:/data/recordings
      - thumbnails:/data/thumbnails
      - audio:/data/audio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_WEBRTC_URL: http://localhost:8889
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  recordings:
  thumbnails:
  audio:
